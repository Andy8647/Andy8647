<svg width="800" height="220" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes typing1 { 0%, 15% { width: 0 } 25%, 100% { width: 340px } }
    @keyframes typing2 { 0%, 30% { width: 0 } 45%, 100% { width: 520px } }
    @keyframes typing3 { 0%, 50% { width: 0 } 65%, 100% { width: 415px } }
    @keyframes blink { 0%, 100% { opacity: 1 } 50% { opacity: 0 } }
    @keyframes fadeIn { 0%, 60% { opacity: 0 } 75%, 100% { opacity: 1 } }

    .terminal-bg { fill: #0d1117; rx: 12; }
    .title-bar { fill: #161b22; }
    .dot-red { fill: #ff5f57; }
    .dot-yellow { fill: #febc2e; }
    .dot-green { fill: #28c840; }
    .title-text { fill: #8b949e; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }

    .prompt { fill: #58a6ff; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 15px; font-weight: bold; }
    .command { fill: #c9d1d9; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 15px; }
    .output { fill: #7ee787; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 15px; }
    .comment { fill: #8b949e; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 14px; font-style: italic; }
    .accent { fill: #d2a8ff; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 15px; }

    .cursor {
      fill: #58a6ff;
      opacity: 0;
      animation: fadeIn 6.5s forwards, blink 1s 6.5s step-end infinite;
    }

    .line1-clip { animation: typing1 4s steps(22) forwards; }
    .line2-clip { animation: typing2 5s steps(35) forwards; }
    .line3-clip { animation: typing3 5.5s steps(28) forwards; }
    .line4 { animation: fadeIn 6.5s forwards; }
  </style>

  <!-- Terminal background -->
  <rect class="terminal-bg" width="800" height="220" />

  <!-- Title bar -->
  <rect class="title-bar" width="800" height="36" rx="12" />
  <rect class="title-bar" width="800" height="16" y="20" />

  <!-- Window controls -->
  <circle class="dot-red" cx="20" cy="18" r="6" />
  <circle class="dot-yellow" cx="40" cy="18" r="6" />
  <circle class="dot-green" cx="60" cy="18" r="6" />
  <text class="title-text" x="370" y="22" text-anchor="middle">andy@shanghai ~ </text>

  <!-- Line 1: whoami -->
  <text class="prompt" x="24" y="72">❯</text>
  <clipPath id="c1"><rect class="line1-clip" x="44" y="54" height="24" /></clipPath>
  <text class="command" x="44" y="72" clip-path="url(#c1)">cat /etc/andy/identity</text>

  <!-- Line 2: output -->
  <clipPath id="c2"><rect class="line2-clip" x="24" y="84" height="24" /></clipPath>
  <text class="output" x="24" y="102" clip-path="url(#c2)">Andy Luo — AI Product Engineer | LLM Systems</text>

  <!-- Line 3: skills -->
  <text class="prompt" x="24" y="132">❯</text>
  <clipPath id="c3"><rect class="line3-clip" x="44" y="114" height="24" /></clipPath>
  <text class="accent" x="44" y="132" clip-path="url(#c3)">LangChain · RAG · Agents · PyTorch</text>

  <!-- Line 4: comment -->
  <text class="comment line4" x="24" y="166" opacity="0"># building AI that ships — from model to product 🚀</text>

  <!-- Blinking cursor -->
  <rect class="cursor" x="24" y="178" width="10" height="18" />
</svg>
